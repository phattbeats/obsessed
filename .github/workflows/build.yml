name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USER }}/obsessed

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Skip playwright/lxml (heavy native builds, not exercised by smoke tests).
          grep -v -i 'playwright\|lxml' requirements.txt > /tmp/reqs-ci.txt
          pip install -r /tmp/reqs-ci.txt pytest==8.3.3 pytest-asyncio==0.24.0

      - name: Run pytest (smoke + schema gate)
        run: pytest -q

  # ui-test runs on demand (workflow_dispatch) or when 'ui-test' is in the commit message.
  # It tests against the live PHATT-RAID container at 10.0.0.100:10198, so it cannot
  # run in a standard push CI — the container is not reachable from GitHub runners.
  ui-test:
    needs: []   # runs independently; build job does not block on it
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'ui-test') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install playwright pytest pytest-asyncio httpx
          playwright install chromium --with-deps

      - name: Run Playwright UI tests
        env:
          PLAYWRIGHT_BASE_URL: http://10.0.0.100:10198
        run: |
          pytest tests/ui/test_trivia_game.py -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
